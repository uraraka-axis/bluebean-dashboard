name: BlueBean データ更新

on:
  schedule:
    # 毎朝 8:00 JST = 23:00 UTC（前日）
    - cron: '0 23 * * *'
  workflow_dispatch: # 手動実行用

jobs:
  fetch-and-process:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 依存パッケージインストール
        run: npm ci

      - name: Playwright ブラウザインストール
        run: npx playwright install chromium --with-deps

      - name: CSV取得（BlueBean）
        env:
          BB_URL: ${{ secrets.BB_URL }}
          BB_USER: ${{ secrets.BB_USER }}
          BB_PASS: ${{ secrets.BB_PASS }}
        run: node scripts/fetch-csv.js

      - name: CSV → JSON 集計
        run: node scripts/process-csv.js

      - name: 変更をコミット＆プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "変更なし。スキップ。"
          else
            git commit -m "data: $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M') のデータ更新"
            git push
          fi
